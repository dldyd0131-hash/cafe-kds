<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ 매장 운영 관리자 시스템</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 기본 디자인 리셋 및 모던 폰트 적용 */
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 0; }
        
        body { 
            color: #333; 
            padding: 20px; 
            line-height: 1.5;
            min-height: 100vh;
            
            /* 📸 매장 운영 후에도 전체 화면에 고정되는 공통 배경화면 */
            background-image: linear-gradient(rgba(244, 241, 248, 0.85), rgba(244, 241, 248, 0.92)), 
                              url('images/adminbg.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* 스크롤해도 배경 고정 */
        }

        /* 💻 웹/노트북 화면에서 공간을 더 넓게 쓰도록 최대 너비 확장 (1100px -> 1400px) */
        .admin-container { 
            max-width: 1400px; 
            margin: 0 auto; 
            position: relative;
            z-index: 1;
        }

        /* 🎮 1. 인트로 화면 (동일한 배경 사용, 버튼 클릭 시 콘텐츠만 페이드아웃) */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)), 
                              url('images/adminbg.png'); 
            background-size: cover;         
            background-position: center;   
            background-repeat: no-repeat;  
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; text-align: center; padding: 20px;
            transition: all 0.6s ease-in-out;
        }
        
        #intro-screen h1 { font-size: 38px; margin-bottom: 30px; text-shadow: 0 4px 15px rgba(0,0,0,0.6); font-weight: 800; letter-spacing: -0.5px; }
        
        /* 💜 연보라 테마 메인 버튼 */
        .start-btn {
            background: #9b59b6; color: white; border: none; padding: 16px 50px;
            font-size: 19px; font-weight: bold; border-radius: 30px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(155, 89, 182, 0.4); transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .start-btn:hover { transform: scale(1.05); background: #a264be; box-shadow: 0 12px 30px rgba(155, 89, 182, 0.5); }

        /* 💜 연보라/라벤더 감성으로 리뉴얼된 상단 헤더 */
        header {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white;
            padding: 30px 20px; border-radius: 16px; text-align: center;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.15); margin-bottom: 25px;
        }
        header h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
        header p { font-size: 14px; opacity: 0.9; margin-bottom: 15px; }

        /* 🚨 실시간 영업 상태 제어 바 */
        .status-control-bar {
            background: rgba(255, 255, 255, 0.2); padding: 12px 20px; border-radius: 30px;
            display: inline-flex; align-items: center; gap: 15px; margin-top: 5px;
            backdrop-filter: blur(5px);
        }
        .status-text { font-weight: bold; font-size: 15px; }
        .status-btn {
            border: none; padding: 8px 20px; font-size: 13px; font-weight: bold;
            border-radius: 20px; cursor: pointer; transition: all 0.2s;
        }
        .status-btn.open { background: #00b894; color: white; box-shadow: 0 4px 10px rgba(0, 184, 148, 0.3); }
        .status-btn.close { background: #d63031; color: white; box-shadow: 0 4px 10px rgba(214, 48, 49, 0.3); }

        /* 대시보드 그리드 배치 */
        .dashboard-grid { display: block; }
        .section-card { 
            background: rgba(255, 255, 255, 0.92); padding: 28px; border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.04); margin-bottom: 25px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .section-card h2 { 
            font-size: 19px; color: #4834d4; margin-bottom: 22px; 
            padding-bottom: 12px; border-bottom: 2px solid #efecf9;
        }

        /* 입력 폼 디자인 (연보라 포커스 포인트) */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; font-size: 14px; color: #5f27cd; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 13px 16px; border: 1px solid #dcdde1; border-radius: 10px; font-size: 15px; background-color: #fcfbfe; transition: all 0.2s; }
        .form-group input:focus { background-color: #fff; border-color: #6c5ce7; outline: none; box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15); }
        
        .submit-btn { background: #6c5ce7; color: white; border: none; width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: background 0.2s; box-shadow: 0 6px 15px rgba(108, 92, 231, 0.2); }
        .submit-btn:hover { background: #5f27cd; }
        
        /* 메뉴 리스트 카드 */
        .menu-item-row { display: flex; align-items: center; padding: 16px; border: 1px solid #f1f0f7; border-radius: 12px; margin-bottom: 14px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.01); transition: opacity 0.2s; }
        .menu-thumb { width: 68px; height: 68px; object-fit: cover; border-radius: 10px; background: #f1f0f7; margin-right: 18px; flex-shrink: 0; }
        .menu-details { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; }
        .menu-title { font-size: 16px; font-weight: bold; color: #2c3e50; }
        .menu-meta { font-size: 14px; color: #7f8c8d; display: flex; gap: 15px; align-items: center; }
        .stock-badge { display: inline-block; padding: 2px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .stock-in { background: #eeeafc; color: #6c5ce7; }
        .stock-out { background: #ffeaa7; color: #d63031; }
        .delete-btn { background: #fff; color: #ff7675; border: 1px solid #fab1a0; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; margin-left: 8px; }
        .delete-btn:hover { background: #ff7675; color: white; border-color: #ff7675; }

        /* 🆕 드래그 앤 제어 전용 스타일 추가 */
        .drag-handle { cursor: move; color: #b2bec3; font-size: 18px; margin-right: 15px; flex-shrink: 0; }
        .dragging { opacity: 0.4; border: 2px dashed #6c5ce7 !important; background: #f5f4fa !important; }
        .stock-edit-input { width: 65px; padding: 4px 6px; border: 1px solid #dcdde1; border-radius: 6px; font-size: 13px; font-weight: bold; text-align: center; color: #6c5ce7; background: #fcfbfe; }
        .stock-edit-input:focus { outline: none; border-color: #6c5ce7; background: #fff; }
        .toggle-active-btn { border: none; padding: 6px 14px; font-size: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .toggle-active-btn.active { background: #e3faf1; color: #00b894; border: 1px solid #00b894; }
        .toggle-active-btn.inactive { background: #ffebee; color: #d63031; border: 1px solid #d63031; }
        .disabled-row { opacity: 0.55; background-color: #f8f9fa; }

        /* 💻 PC/노트북 넓은 화면 전용 스타일 (미디어 쿼리 핵심 수정) */
        @media (min-width: 992px) {
            body { padding: 40px 30px; }
            #intro-screen h1 { font-size: 56px; }
            header { padding: 40px 20px; }
            header h1 { font-size: 34px; }
            
            /* 웹 화면을 훨씬 넓게 활용하기 위해 3.5 대 6.5 비율 배치 */
            .dashboard-grid { display: table; width: 100%; table-layout: fixed; }
            .grid-left { display: table-cell; width: 35%; padding-right: 25px; vertical-align: top; }
            .grid-right { display: table-cell; width: 65%; padding-left: 25px; vertical-align: top; }
            
            /* 넓은 웹 화면에서는 리스트 가로 폭 극대화 및 글자 크기 최적화 */
            .menu-item-row { padding: 20px; }
            .menu-title { font-size: 18px; width: 30%; }
            .menu-details { flex-direction: row; align-items: center; justify-content: space-between; padding-right: 20px; }
            .menu-meta { font-size: 15px; width: 65%; justify-content: flex-end; gap: 25px; }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1>학교 매장 실습 시스템</h1>
        <button class="start-btn" onclick="startAdminMode()">매장 운영하기</button>
    </div>

    <div class="admin-container">
        <header>
            <h1>⚙️ 실습 운영 관리자 센터</h1>
            <p>메뉴 등록 및 실시간 영업 상태를 제어합니다.</p>
            
            <div class="status-control-bar">
                <span class="status-text">상태: <span id="current-status-text" style="color: #ffeaa7;">확인 중...</span></span>
                <button id="toggle-status-btn" class="status-btn open" onclick="toggleStoreStatus()">영업 시작하기</button>
            </div>
        </header>
        
        <div class="dashboard-grid">
            <div class="grid-left">
                <div class="section-card">
                    <h2>✨ 새 메뉴 추가</h2>
                    <div class="form-group">
                        <label>🍔 메뉴 이름</label>
                        <input type="text" id="menu-name" placeholder="예: 아이스 아메리카노">
                    </div>
                    <div class="form-group">
                        <label>💰 판매 가격 (원)</label>
                        <input type="number" id="menu-price" placeholder="예: 2500">
                    </div>
                    <div class="form-group">
                        <label>📦 초기 판매 수량 (재고)</label>
                        <input type="number" id="menu-stock" placeholder="예: 15">
                    </div>
                    <div class="form-group">
                        <label>🌐 인터넷 이미지 주소</label>
                        <input type="text" id="menu-image-url" placeholder="이미지 주소를 붙여넣으세요.">
                    </div>
                    <button class="submit-btn" onclick="uploadMenu()">메뉴 등록하기</button>
                </div>
            </div>

            <div class="grid-right">
                <div class="section-card">
                    <h2>📊 등록된 메뉴 및 실시간 재고 현황 <span style="font-size:12px; color:#7f8c8d; font-weight:normal; float:right; margin-top:5px;">↕ 드래그하여 순서 정렬</span></h2>
                    <div id="admin-menu-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, setDoc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVoO2KYyzZEIE-SyySmu3rNzu8AYr3mnk",
            authDomain: "school-cafe-73253.firebaseapp.com",
            projectId: "school-cafe-73253",
            storageBucket: "school-cafe-73253.firebasestorage.app",
            messagingSenderId: "338045111027",
            appId: "1:338045111027:web:ab9c11793582bdcdb20586"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let isStoreOpen = false;
        let localMenuList = [];

        // 배경화면은 유지하되 인트로의 글씨와 버튼만 투명해지며 스르륵 위로 사라지게 구현
        window.startAdminMode = function() {
            const intro = document.getElementById('intro-screen');
            intro.style.opacity = 0;
            intro.style.transform = "translateY(-100vh)";
            setTimeout(() => intro.style.display = 'none', 600);
        };

        onSnapshot(doc(db, "system_status", "store"), (docSnap) => {
            const statusText = document.getElementById('current-status-text');
            const toggleBtn = document.getElementById('toggle-status-btn');
            
            if (docSnap.exists() && docSnap.data().status === "open") {
                isStoreOpen = true;
                statusText.innerText = "🟢 영업 중";
                statusText.style.color = "#00b894";
                toggleBtn.innerText = "🛑 영업 종료하기";
                toggleBtn.className = "status-btn close";
            } else {
                isStoreOpen = false;
                statusText.innerText = "🔴 영업 준비 중 (주문 차단됨)";
                statusText.style.color = "#ff7675";
                toggleBtn.innerText = "🟢 영업 시작하기";
                toggleBtn.className = "status-btn open";
            }
        });

        window.toggleStoreStatus = async function() {
            const nextStatus = isStoreOpen ? "closed" : "open";
            const confirmMsg = isStoreOpen ? "영업을 종료하고 주문을 차단하시겠습니까?" : "영업을 시작하고 학생들이 주문할 수 있게 허용하시겠습니까?";
            
            if(confirm(confirmMsg)) {
                await setDoc(doc(db, "system_status", "store"), { status: nextStatus });
            }
        };

        window.uploadMenu = async function() {
            const name = document.getElementById('menu-name').value;
            const price = document.getElementById('menu-price').value;
            const stock = parseInt(document.getElementById('menu-stock').value);
            const imageUrl = document.getElementById('menu-image-url').value;

            if(!name || !price || isNaN(stock) || !imageUrl) {
                alert("모든 빈칸을 채워주세요!");
                return;
            }

            try {
                await addDoc(collection(db, "menus"), {
                    name: name,
                    price: parseInt(price).toLocaleString() + "원",
                    stock: stock,
                    imageUrl: imageUrl,
                    isActive: true, // 🆕 기본 활성화 상태 추가
                    index: localMenuList.length // 🆕 현재 리스트 최하단 인덱스 지정
                });

                alert("🎉 메뉴가 성공적으로 등록되었습니다!");
                document.getElementById('menu-name').value = '';
                document.getElementById('menu-price').value = '';
                document.getElementById('menu-stock').value = '';
                document.getElementById('menu-image-url').value = '';
            } catch (e) {
                console.error(e);
            }
        };

        const adminMenuList = document.getElementById('admin-menu-list');
        onSnapshot(collection(db, "menus"), (snapshot) => {
            localMenuList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // 🆕 index 기반 실시간 정렬 정제 (순서 번호가 없으면 하단으로)
            localMenuList.sort((a, b) => (a.index ?? 999) - (b.index ?? 999));

            if(localMenuList.length === 0) {
                adminMenuList.innerHTML = `<p style="text-align:center; color:#a0aec0; padding:40px 0;">등록된 메뉴가 없습니다. 😊</p>`;
                return;
            }

            adminMenuList.innerHTML = localMenuList.map(item => {
                const isSoldOut = item.stock === 0;
                const isActive = item.isActive !== false; // 기본값 true 유도
                
                return `
                    <div class="menu-item-row ${isActive ? '' : 'disabled-row'}" draggable="true" data-id="${item.id}">
                        <div class="drag-handle"><i class="fa-solid fa-bars"></i></div>
                        
                        <img src="${item.imageUrl}" class="menu-thumb" onerror="this.src='https://placehold.co/100x100?text=No+Img'">
                        <div class="menu-details">
                            <div class="menu-title">${item.name}</div>
                            <div class="menu-meta">
                                <span><strong>가격:</strong> ${item.price}</span>
                                
                                <span>
                                    <strong>재고:</strong> 
                                    <input type="number" class="stock-edit-input" value="${item.stock ?? 0}" onchange="updateMenuStock('${item.id}', this.value)">
                                    <span class="stock-badge ${isSoldOut ? 'stock-out' : 'stock-in'}" style="margin-left:4px;">${isSoldOut ? '품절' : '보유'}</span>
                                </span>

                                <button class="toggle-active-btn ${isActive ? 'active' : 'inactive'}" onclick="toggleMenuLink('${item.id}', ${isActive})">
                                    ${isActive ? '🟢 노출중' : '🔴 숨김됨'}
                                </button>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteMenu('${item.id}')">삭제</button>
                    </div>
                `;
            }).join('');

            setupDragOrdering(); // 🆕 렌더링 이후 드래그 핸들러 매핑 엔진 실행
        });

        // 🆕 실시간 인풋 재고 수량 동기화 제어 함수
        window.updateMenuStock = async function(id, val) {
            try {
                await updateDoc(doc(db, "menus", id), { stock: Number(val) });
            } catch (e) {
                console.error("재고 변경 실패:", e);
            }
        };

        // 🆕 실시간 활성화/숨김 스위치 토글 함수
        window.toggleMenuLink = async function(id, currentStatus) {
            try {
                await updateDoc(doc(db, "menus", id), { isActive: !currentStatus });
            } catch (e) {
                console.error("노출 상태 변경 실패:", e);
            }
        };

        window.deleteMenu = async function(id) {
            if(confirm("이 메뉴를 정말 삭제하시겠습니까?")) {
                await deleteDoc(doc(db, "menus", id));
            }
        };

        // 🆕 HTML5 네이티브 드래그 앤 드롭 정렬 동기화 엔진 구현
        function setupDragOrdering() {
            const rows = adminMenuList.querySelectorAll('.menu-item-row');
            
            rows.forEach(row => {
                row.addEventListener('dragstart', () => row.classList.add('dragging'));
                row.addEventListener('dragend', async () => {
                    row.classList.remove('dragging');
                    
                    const reorderedRows = [...adminMenuList.querySelectorAll('.menu-item-row')];
                    const batch = writeBatch(db);
                    
                    reorderedRows.forEach((el, nextIdx) => {
                        const docId = el.getAttribute('data-id');
                        batch.update(doc(db, "menus", docId), { index: nextIdx });
                    });
                    
                    await batch.commit();
                });
            });

            adminMenuList.addEventListener('dragover', (e) => {
                e.preventDefault();
                const draggingRow = adminMenuList.querySelector('.dragging');
                if(!draggingRow) return;

                const siblings = [...adminMenuList.querySelectorAll('.menu-item-row:not(.dragging)')];
                const nextSibling = siblings.find(sibling => {
                    const box = sibling.getBoundingClientRect();
                    return e.clientY <= box.top + box.height / 2;
                });
                
                adminMenuList.insertBefore(draggingRow, nextSibling);
            });
        }
    </script>
</body>
</html>
