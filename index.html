<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍳 주방 주문 접수대 (KDS)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                            600: '#475569'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-dark-900 text-slate-100 min-h-screen p-4 md:p-6 font-sans relative">

    <div id="audio-notice" class="bg-amber-500 text-white font-bold p-3 text-center rounded-xl mb-4 shadow-md flex items-center justify-center gap-2 animate-pulse cursor-pointer z-[100]" onclick="unlockAudio()">
        <i class="fa-solid fa-volume-high"></i>
        <span>[중요] 실시간 주문 소리를 들으시려면 여기 화면을 꼭 '한 번 클릭'해 주세요!</span>
    </div>

    <header class="bg-dark-800 rounded-2xl p-4 md:p-6 border border-dark-700 shadow-xl mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-2xl font-black tracking-tight flex items-center gap-2 text-white">
                <span>☕ 카페 주방 시스템 (KDS)</span>
                <span class="text-xs bg-emerald-500 text-white px-2 py-0.5 rounded-md font-bold animate-pulse">LIVE</span>
            </h1>
            <p class="text-xs text-slate-400 mt-1">주방에서 만들어야 할 대기 주문만 표시됩니다.</p>
        </div>
        
        <div class="flex flex-wrap items-center gap-3.5 w-full md:w-auto justify-end">
            
            <div class="flex items-center gap-4 bg-dark-900/80 px-4 py-2 rounded-xl border border-dark-700 text-xs text-center shrink-0">
                <div>
                    <p class="text-slate-500 font-bold mb-0.5">⏳ 제조 대기</p>
                    <p id="header-count-wait" class="text-base font-black text-amber-400">0건</p>
                </div>
                <div class="h-6 w-px bg-dark-700"></div>
                <div>
                    <p class="text-slate-500 font-bold mb-0.5">✨ 오늘 완료</p>
                    <p id="header-count-done" class="text-base font-black text-emerald-400">0건</p>
                </div>
            </div>

            <div class="flex items-center gap-2.5 bg-dark-900 px-3 py-2 rounded-xl border border-dark-700 text-xs shrink-0">
                <span class="font-bold text-slate-400">영업 제어:</span>
                <button id="store-status-btn" onclick="toggleStoreStatus()" class="px-3 py-1.5 rounded-lg font-black text-[11px] transition duration-200 bg-slate-700 text-slate-300">
                    조회 중...
                </button>
            </div>
        </div>
    </header>

    <main class="w-full max-w-5xl mx-auto">
        <div class="bg-dark-800 rounded-2xl p-5 border border-dark-700 shadow-2xl">
            <h2 class="text-base font-black text-slate-300 mb-4 flex items-center justify-between border-b border-dark-700 pb-3 gap-2 flex-wrap">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-fire-burner text-amber-500"></i>
                    <span>현재 조리 및 제조 대기열</span>
                    <span id="active-counter" class="text-xs bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-0.5 rounded-full font-black">대기 0건</span>
                </div>
                
                <button onclick="openHistoryModal()" class="bg-dark-700 hover:bg-dark-600 text-slate-200 font-extrabold text-xs px-3.5 py-2 rounded-xl border border-dark-600 transition flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-clock-rotate-left text-indigo-400"></i>
                    <span>이전 내역 / 당일 매출 확인</span>
                </button>
            </h2>

            <div id="integrated-orders-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 items-start">
            </div>
        </div>
    </main>

    <div id="history-modal" class="fixed inset-0 bg-black/80 z-[999] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-dark-800 border border-dark-700 rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden transform scale-95 transition-all duration-300 flex flex-col max-h-[85vh]">
            <div class="bg-dark-700 p-4 border-b border-dark-600 text-white flex justify-between items-center">
                <h3 class="text-base font-black flex items-center gap-2 text-slate-200">
                    <i class="fa-solid fa-circle-check text-emerald-400"></i>
                    <span>주방 출고 이후 내역 기록</span>
                </h3>
                <button onclick="closeHistoryModal()" class="text-slate-400 hover:text-white text-xl">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="p-4 bg-dark-900/90 border-b border-dark-700 flex justify-between items-center px-6">
                <div class="flex items-center gap-2.5">
                    <i class="fa-solid fa-coins text-amber-400 text-xl animate-pulse"></i>
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">오늘 당일 실습 총매출 (<span id="today-date-display" class="font-mono text-indigo-400">0000-00-00</span>)</p>
                        <p id="today-sales-amount" class="text-xl font-black text-emerald-400 tracking-tight">0원</p>
                    </div>
                </div>
                <span class="text-[10px] bg-dark-700 text-slate-400 px-2 py-1 rounded font-bold border border-dark-600">실시간 자동 정산</span>
            </div>

            <div class="p-5 overflow-y-auto space-y-4 flex-1 bg-dark-900/40" id="history-orders-list">
            </div>
            <div class="p-3 border-t border-dark-700 bg-dark-800 text-center text-[11px] text-slate-500 font-medium">
                배달중 상태의 주문은 관제탑(배달원) 시스템에서 완료 처리가 진행되면 자동으로 배달완료로 갱신됩니다.
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVoO2KYyzZEIE-SyySmu3rNzu8AYr3mnk",
            authDomain: "school-cafe-73253.firebaseapp.com",
            projectId: "school-cafe-73253",
            storageBucket: "school-cafe-73253.firebasestorage.app",
            messagingSenderId: "338045111027",
            appId: "1:338045111027:web:ab9c11793582bdcdb20586"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🔊 오디오 객체
        let audioUnlocked = false;
        let audioCtx = null;
        const soundQueue = [];
        let isProcessingQueue = false;
        const deliverySound = new Audio("audio/baedal.mp3");

        window.unlockAudio = function() {
            audioUnlocked = true;
            document.getElementById('audio-notice').classList.add('hidden');
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            deliverySound.play().then(() => deliverySound.pause()).catch(e => console.log("Bypass"));
        };

        window.queueNotification = function(type) {
            if (!audioUnlocked) return;
            soundQueue.push(type);
            processNextNotification();
        };

        async function processNextNotification() {
            if (isProcessingQueue || soundQueue.length === 0) return;
            isProcessingQueue = true;
            const nextType = soundQueue.shift();

            if (nextType === "매장") {
                playDingDongSound();
                await new Promise(resolve => setTimeout(resolve, 1300)); 
            } else if (nextType === "배달") {
                try {
                    deliverySound.currentTime = 0;
                    await deliverySound.play();
                    await new Promise(resolve => setTimeout(resolve, 2500));
                } catch (e) { console.error(e); }
            }
            isProcessingQueue = false;
            processNextNotification();
        }

        function playDingDongSound() {
            if (!audioCtx || !audioUnlocked) return;
            try {
                const now = audioCtx.currentTime;
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = "sine";
                osc1.frequency.setValueAtTime(784, now); 
                gain1.gain.setValueAtTime(0.2, now);
                gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start(now);
                osc1.stop(now + 0.4);

                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = "sine";
                osc2.frequency.setValueAtTime(659, now + 0.25);
                gain2.gain.setValueAtTime(0.2, now + 0.25);
                gain2.gain.exponentialRampToValueAtTime(0.01, now + 1.1);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start(now + 0.25);
                osc2.stop(now + 1.1);
            } catch (e) { console.error(e); }
        }

        function playBeepSound() {
            if (!audioCtx || !audioUnlocked) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(1050, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); 
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch (e) { console.error(e); }
        }

        // 🏪 영업 상태 제어
        let currentStatus = "closed";
        const storeStatusBtn = document.getElementById('store-status-btn');
        onSnapshot(doc(db, "system_status", "store"), (docSnap) => {
            if(docSnap.exists()) {
                currentStatus = docSnap.data().status;
                if(currentStatus === "open") {
                    storeStatusBtn.innerText = "🟢 영업 중";
                    storeStatusBtn.className = "px-3 py-1.5 rounded-lg font-black text-[11px] text-white bg-emerald-600 hover:bg-emerald-700 transition shadow-sm";
                } else {
                    storeStatusBtn.innerText = "🔴 준비 중";
                    storeStatusBtn.className = "px-3 py-1.5 rounded-lg font-black text-[11px] text-white bg-rose-600 hover:bg-rose-700 transition shadow-sm";
                }
            }
        });

        window.toggleStoreStatus = async function() {
            const nextStatus = currentStatus === "open" ? "closed" : "open";
            try { await updateDoc(doc(db, "system_status", "store"), { status: nextStatus }); } catch(e) { console.error(e); }
        };

        // 모달창 제어
        window.openHistoryModal = function() {
            const modal = document.getElementById('history-modal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.firstElementChild.className = modal.firstElementChild.className.replace('scale-95', 'scale-100'), 5);
        };
        window.closeHistoryModal = function() {
            const modal = document.getElementById('history-modal');
            modal.firstElementChild.className = modal.firstElementChild.className.replace('scale-100', 'scale-95');
            setTimeout(() => modal.classList.add('hidden'), 150);
        };

        function getTodayString() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        // 🖼️ 개별 메뉴 이미지를 위한 캐시
        const menuImagesCache = {};
        onSnapshot(collection(db, "menus"), (snapshot) => {
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                menuImagesCache[data.name.trim()] = data.imageUrl;
            });
        });

        // 📋 주문 동기화 리스너
        let isFirstLoad = true;

        onSnapshot(collection(db, "orders"), (snapshot) => {
            const allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

            // 대기 주문 (매장/배달 상관없이 먼저 들어온 순서대로 정렬)
            const activeOrders = allOrders
                .filter(order => order.status === "대기")
                .sort((a, b) => (a.timestamp?.toMillis() || Date.now()) - (b.timestamp?.toMillis() || Date.now()));

            // 이전 처리 기록 (최신 완료 이력이 위로)
            const historyOrders = allOrders
                .filter(order => order.status === "완료" || order.status === "배달중")
                .sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));

            // 우측 상단 헤더 현황판 및 타이틀 카운터 실시간 동기화
            document.getElementById('active-counter').innerText = `대기 ${activeOrders.length}건`;
            document.getElementById('header-count-wait').innerText = `${activeOrders.length}건`;

            // 오늘 주방 손을 떠난(처리 완료된) 총 건수 산출 (매장 완료 + 배달 출발된 건수 합산)
            const todayStr = getTodayString();
            const todayProcessedCount = allOrders.filter(o => {
                if (o.status !== "완료" && o.status !== "배달중") return false;
                if (!o.timestamp) return false;
                const orderDateStr = new Date(o.timestamp.toMillis()).toISOString().split('T')[0];
                return orderDateStr === todayStr;
            }).length;
            document.getElementById('header-count-done').innerText = `${todayProcessedCount}건`;

            // 신규 알림음 작동
            if (isFirstLoad) {
                isFirstLoad = false; 
            } else {
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const newOrder = change.doc.data();
                        if (newOrder.status === "대기") {
                            if (newOrder.type === "배달") window.queueNotification("배달");
                            else window.queueNotification("매장");
                        }
                    }
                });
            }

            renderMainDashboard(activeOrders);
            renderHistoryModal(historyOrders);
            calculateTodaySales(historyOrders);
        });

        // 주방 메인 단일 대기열 렌더러
        function renderMainDashboard(activeOrders) {
            const container = document.getElementById('integrated-orders-container');
            if (activeOrders.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-24 text-slate-500 font-bold bg-dark-900 rounded-xl border border-dashed border-dark-700">
                        <span class="text-4xl block mb-2">🎉</span>
                        <p class="text-sm">제조 대기 중인 주문이 없습니다.</p>
                    </div>`;
                return;
            }

            container.innerHTML = activeOrders.map(order => {
                const timeStr = order.timestamp ? new Date(order.timestamp.toMillis()).toLocaleTimeString('ko-KR', {hour: '2-digit', minute:'2-digit'}) : '방금 전';
                const isDelivery = order.type === "배달";

                const typeBadge = isDelivery 
                    ? `<span class="bg-purple-500/20 text-purple-400 border border-purple-500/30 px-2 py-0.5 rounded text-[10px] font-black uppercase"><i class="fa-solid fa-motorcycle mr-1"></i>새솔의민족</span>`
                    : `<span class="bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 px-2 py-0.5 rounded text-[10px] font-black uppercase"><i class="fa-solid fa-shop mr-1"></i>매장 방문</span>`;

                // 조리 완료 처리 버튼 (배달은 누르면 배달중, 매장은 완료 상태로 변경)
                const controlBtn = isDelivery
                    ? `<button onclick="changeStatus('${order.id}', '배달중')" class="w-full bg-amber-500 hover:bg-amber-600 text-dark-900 font-black text-xs py-3 rounded-xl transition shadow-lg">🛵 배달원 출발</button>`
                    : `<button onclick="changeStatus('${order.id}', '완료')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xs py-3 rounded-xl transition shadow-lg">🥤 제조완료 출고</button>`;

                // 🌟 메뉴 텍스트를 쪼개서 세로 리스트로 변환
                const itemsStrList = (order.menuName || "").split(' / ');
                const itemsHtml = itemsStrList.map(itemStr => {
                    const match = itemStr.match(/(.*)\s+(\d+개)$/);
                    let cleanName = itemStr;
                    let quantity = "1개";
                    
                    if(match) {
                        cleanName = match[1].trim();
                        quantity = match[2];
                    }

                    const exactImage = menuImagesCache[cleanName] || order.menuImageUrl || 'https://placehold.co/100?text=No+Img';

                    return `
                        <div class="flex items-center gap-3 bg-dark-800 p-2 rounded-lg border border-dark-600">
                            <img src="${exactImage}" class="w-12 h-12 object-cover rounded bg-white p-0.5 shrink-0 border border-dark-500">
                            <div class="flex-1 overflow-hidden">
                                <h4 class="font-bold text-slate-200 text-[13px] leading-tight break-keep">${cleanName}</h4>
                            </div>
                            <div class="bg-dark-700 text-amber-400 font-black text-sm px-2.5 py-1.5 rounded shrink-0 border border-dark-600">
                                ${quantity}
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="bg-dark-900 rounded-xl border border-dark-700 p-4 flex flex-col justify-between gap-4 transition hover:border-slate-500">
                        <div class="space-y-3">
                            <div class="flex items-center justify-between gap-2 border-b border-dark-700 pb-2">
                                <div class="flex items-center gap-2">
                                    <span class="text-amber-400 font-black text-base">#${order.orderNumber}</span>
                                    ${typeBadge}
                                </div>
                                <span class="text-[11px] text-slate-400 font-bold shrink-0 bg-dark-800 px-2 py-1 rounded">${timeStr}</span>
                            </div>
                            
                            <!-- 구매자 및 배달 정보 -->
                            <div class="text-xs text-slate-300 font-medium space-y-1 bg-dark-800/60 p-2.5 rounded-lg border border-dark-600">
                                <p>👤 주문명: <span class="text-white font-bold">${order.buyerName || '미입력'}</span></p>
                                ${order.deliveryLocation ? `<p class="text-purple-300">📍 배송지: <span class="font-bold border-b border-purple-500/30">${order.deliveryLocation}</span></p>` : ''}
                            </div>

                            <!-- 세로로 나열되는 메뉴 목록 -->
                            <div class="flex flex-col gap-2">
                                ${itemsHtml}
                            </div>
                        </div>

                        <div class="pt-2 border-t border-dark-700">
                            ${controlBtn}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 모달 내부의 이전 이력 렌더러
        function renderHistoryModal(historyOrders) {
            const container = document.getElementById('history-orders-list');
            if (historyOrders.length === 0) {
                container.innerHTML = `<p class="text-center py-12 text-xs text-slate-500 font-bold">출고 처리된 내역이 아직 없습니다.</p>`;
                return;
            }

            const grouped = {};
            historyOrders.forEach(order => {
                let dateStr = "날짜 정보 없음";
                if (order.timestamp) {
                    dateStr = new Date(order.timestamp.toMillis()).toISOString().split('T')[0];
                }
                if (!grouped[dateStr]) grouped[dateStr] = [];
                grouped[dateStr].push(order);
            });

            const sortedDates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

            container.innerHTML = sortedDates.map(dateKey => {
                const groupOrders = grouped[dateKey];
                
                const itemsHtml = groupOrders.map(order => {
                    const timeStr = order.timestamp ? new Date(order.timestamp.toMillis()).toLocaleTimeString('ko-KR', {hour: '2-digit', minute:'2-digit'}) : '기록없음';
                    
                    let statusBadge = "";
                    if (order.status === "배달중") {
                        statusBadge = `<span class="bg-amber-500/20 text-amber-400 border border-amber-500/30 px-1.5 py-0.5 rounded font-black text-[10px] flex items-center gap-1 animate-pulse"><i class="fa-solid fa-motorcycle text-[9px]"></i>배달중 (관제대기)</span>`;
                    } else if (order.status === "완료") {
                        statusBadge = order.type === "배달" 
                            ? `<span class="bg-purple-900/40 text-purple-400 border border-purple-500/20 px-1.5 py-0.5 rounded font-bold text-[10px]"><i class="fa-solid fa-house-flag mr-1"></i>배달 완료</span>`
                            : `<span class="bg-emerald-900/40 text-emerald-400 border border-emerald-500/20 px-1.5 py-0.5 rounded font-bold text-[10px]"><i class="fa-solid fa-circle-check mr-1"></i>수령 완료</span>`;
                    }

                    return `
                        <div class="bg-dark-900 rounded-xl p-3 border border-dark-700 flex justify-between items-center text-xs group">
                            <div>
                                <span class="font-bold text-slate-400 mr-2">#${order.orderNumber}</span>
                                <span class="font-extrabold text-slate-200">${order.menuName}</span>
                                <span class="text-[10px] text-slate-500 ml-2">(${order.buyerName || '손님'} / ${order.type})</span>
                                <div class="text-[10px] text-slate-500 mt-0.5 flex items-center gap-2">
                                    <span>${timeStr}</span>
                                    ${statusBadge}
                                </div>
                            </div>
                            <button onclick="deleteSingleHistory('${order.id}')" class="text-slate-500 hover:text-rose-400 p-1.5 rounded transition bg-dark-800 hover:bg-rose-950/40 ml-2" title="이 내역만 삭제">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="border border-dark-700/60 bg-dark-800/30 p-3 rounded-xl space-y-2">
                        <div class="flex justify-between items-center border-b border-dark-700 pb-1.5 px-0.5">
                            <span class="font-mono text-xs font-black text-slate-300"><i class="fa-regular fa-calendar-days mr-1 text-indigo-400"></i>${dateKey} (${groupOrders.length}건)</span>
                            <button onclick="deleteDateGroupHistory('${dateKey}')" class="text-[10px] text-rose-400/80 hover:text-rose-400 font-bold bg-rose-950/30 hover:bg-rose-950/50 border border-rose-500/20 px-2 py-0.5 rounded transition">
                                <i class="fa-solid fa-dumpster mr-1"></i>이 날짜 전체 삭제
                            </button>
                        </div>
                        <div class="space-y-2">${itemsHtml}</div>
                    </div>
                `;
            }).join('');
        }

        // 실시간 당일 매출 누적 정산 계산기
        function calculateTodaySales(historyOrders) {
            const todayStr = getTodayString();
            let totalAmount = 0;

            historyOrders.forEach(order => {
                if (!order.timestamp) return;
                const orderDateStr = new Date(order.timestamp.toMillis()).toISOString().split('T')[0];
                
                if (orderDateStr === todayStr && order.price) {
                    const purePriceNum = parseInt(String(order.price).replace(/[^0-9]/g, ''), 10);
                    if (!isNaN(purePriceNum)) totalAmount += purePriceNum;
                }
            });

            document.getElementById('today-date-display').innerText = todayStr;
            document.getElementById('today-sales-amount').innerText = totalAmount.toLocaleString() + "원";
        }

        // 과거 이력 개별 삭제
        window.deleteSingleHistory = async function(orderId) {
            if(confirm("이 내역을 목록에서 완전히 삭제하시겠습니까?\n(매출 정산 및 완료 건수 통계에서도 즉시 제외됩니다)")) {
                try {
                    playBeepSound();
                    await deleteDoc(doc(db, "orders", orderId));
                } catch(e) { console.error("삭제 실패:", e); }
            }
        };

        // 하루치 이력 통합 삭제
        window.deleteDateGroupHistory = async function(dateString) {
            const doubleCheck = confirm(`⚠️ [ ${dateString} ] 자에 처리된 모든 로그를 일괄 제거하겠습니까?\n삭제된 이력 데이터는 절대로 되돌릴 수 없습니다.`);
            if(!doubleCheck) return;

            try {
                playBeepSound();
                const qSnap = await getDocs(collection(db, "orders"));
                let deletedCount = 0;
                
                for (const d of qSnap.docs) {
                    const data = d.data();
                    if((data.status === "완료" || data.status === "배달중") && data.timestamp) {
                        const targetDate = new Date(data.timestamp.toMillis()).toISOString().split('T')[0];
                        if(targetDate === dateString) {
                            await deleteDoc(doc(db, "orders", d.id));
                            deletedCount++;
                        }
                    }
                }
                console.log(`${deletedCount}건 데이터 초기화 완료`);
            } catch(e) { console.error(e); }
        };

        // 상태 전환 처리 및 비프음
        window.changeStatus = async function(orderId, nextStatus) {
            try { 
                playBeepSound(); 
                await updateDoc(doc(db, "orders", orderId), { status: nextStatus }); 
            } catch (e) { 
                console.error(e); 
            }
        };
    </script>
</body>
</html>
