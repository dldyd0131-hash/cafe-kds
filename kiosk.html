<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 SCHOOL CAFE KIOSK (IN-STORE)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f4f1f8',
                            100: '#e9e3f1',
                            200: '#d3c7e4',
                            500: '#8e44ad',
                            600: '#7d3c98',
                            700: '#6c3483',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-image: linear-gradient(rgba(244, 241, 248, 0.85), rgba(244, 241, 248, 0.92)), url('images/bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f0f7; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-brand-50 min-h-screen flex flex-col items-center p-4 md:p-6 relative">

    <div id="closed-overlay" class="fixed inset-0 bg-gradient-to-br from-brand-600 to-indigo-950 z-[9999] flex flex-col justify-center items-center text-white text-center p-6 transition-all duration-500 ease-in-out">
        <div class="text-8xl mb-6 animate-bounce">☕</div>
        <h2 class="text-3xl md:text-4xl font-extrabold mb-4">현재 영업 준비 중입니다</h2>
        <p class="text-base md:text-lg opacity-90 leading-relaxed max-w-md">
            선생님(관리자)께서 영업을 개시하면<br>실시간으로 주문 시스템이 자동으로 활성화됩니다.<br>잠시만 기다려 주세요!
        </p>
    </div>

    <div id="receipt-modal" class="fixed inset-0 bg-black/60 z-[999] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform scale-95 transition-all duration-300">
            <div class="h-2 bg-gradient-to-r from-brand-500 to-indigo-500"></div>
            <div class="p-6 text-center">
                <div class="w-16 h-16 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fa-solid fa-receipt"></i>
                </div>
                <h3 class="text-2xl font-black text-slate-800 mb-1">매장 주문이 접수되었습니다!</h3>
                <p class="text-sm text-slate-500 mb-6">아래 주문번호를 확인해 주세요.</p>
                
                <div class="bg-slate-50 border border-dashed border-slate-200 rounded-xl p-5 mb-6">
                    <span class="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-1">Order Number</span>
                    <span id="modal-order-number" class="text-4xl font-extrabold text-brand-600 tracking-tight">#1</span>
                </div>

                <div class="text-left text-xs text-slate-500 space-y-1 mb-6 bg-brand-50/50 p-4 rounded-xl border border-brand-100">
                    <p class="font-bold text-brand-700 mb-1"><i class="fa-solid fa-circle-info mr-1"></i> 알림 및 이용 안내</p>
                    <p>매장 카운터의 전광판 화면에 대기 번호가 표시되면 주방에서 음식을 수령해 주세요.</p>
                </div>

                <button onclick="closeReceiptModal()" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3.5 px-6 rounded-xl transition duration-200 shadow-lg shadow-brand-500/20">
                    확인 및 닫기
                </button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-6xl flex flex-col lg:flex-row gap-6 items-start mt-2">
        
        <div class="flex-1 w-full">
            <header class="text-center mb-6 bg-white/70 backdrop-blur border border-brand-100 p-5 rounded-2xl shadow-sm">
                <span class="bg-brand-100 text-brand-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">In-Store Kiosk</span>
                <h1 class="text-2xl font-black text-brand-700 tracking-tight flex items-center justify-center gap-2 mt-1">
                    <span>🛒 SCHOOL CAFE KIOSK</span>
                </h1>
            </header>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="menu-container"></div>
        </div>

        <div class="w-full lg:w-80 shrink-0 bg-white/95 backdrop-blur border border-brand-100 rounded-2xl p-4 shadow-md flex flex-col lg:sticky lg:top-6 max-h-[85vh]">
            <h2 class="text-base font-black text-slate-800 mb-3 flex items-center justify-between border-b pb-2.5 border-brand-100">
                <div class="flex items-center gap-1.5 text-brand-700">
                    <i class="fa-solid fa-basket-shopping"></i>
                    <span>선택한 장바구니</span>
                </div>
                <span id="cart-count-badge" class="bg-brand-500 text-white text-[11px] px-2 py-0.5 rounded-full font-black">0</span>
            </h2>
            
            <div id="cart-items-container" class="flex-1 overflow-y-auto space-y-2 pr-1 min-h-[140px] lg:min-h-[250px] max-h-[40vh] lg:max-h-[none]">
                <div id="cart-empty-msg" class="text-center py-12 text-slate-400 text-xs font-semibold">
                    <i class="fa-solid fa-cart-plus text-2xl block mb-2 opacity-40 text-brand-500"></i>
                    메뉴를 선택해 주세요.
                </div>
            </div>

            <div class="border-t border-brand-100 pt-3 mt-3 space-y-3">
                <div class="flex justify-between items-center text-xs font-bold px-0.5">
                    <span class="text-slate-500">최종 주문 합계</span>
                    <span id="cart-total-price" class="text-base font-black text-brand-600">0원</span>
                </div>
                <button id="checkout-btn" onclick="submitCartOrder()" disabled class="w-full bg-slate-300 text-slate-500 font-black py-3 rounded-xl transition duration-200 text-xs md:text-sm cursor-not-allowed">
                    주문하기 (0개)
                </button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVoO2KYyzZEIE-SyySmu3rNzu8AYr3mnk",
            authDomain: "school-cafe-73253.firebaseapp.com",
            projectId: "school-cafe-73253",
            storageBucket: "school-cafe-73253.firebasestorage.app",
            messagingSenderId: "338045111027",
            appId: "1:338045111027:web:ab9c11793582bdcdb20586"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🛒 장바구니 저장 배열 상태변수
        let cart = [];

        // 영업 상태 실시간 감지 리스너
        onSnapshot(doc(db, "system_status", "store"), (docSnap) => {
            const overlay = document.getElementById('closed-overlay');
            if (docSnap.exists() && docSnap.data().status === "open") {
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
                overlay.style.transform = 'translateY(-100vh)';
            } else {
                overlay.style.opacity = '1';
                overlay.style.pointerEvents = 'auto';
                overlay.style.transform = 'translateY(0)';
            }
        });

        const menuContainer = document.getElementById('menu-container');
        onSnapshot(collection(db, "menus"), (snapshot) => {
            
            // 🔥 [핵심 해결 1]: 관리자가 숨김 처리한 메뉴를 실시간으로 필터링하여 완벽 제외
            const activeDocs = snapshot.docs.filter(docSnap => {
                const menuData = docSnap.data();
                return !(menuData.hidden === true || menuData.hide === true || menuData.status === "hidden");
            });

            if(activeDocs.length === 0) {
                menuContainer.innerHTML = `
                    <div class="col-span-full text-center py-16 bg-white rounded-3xl border border-dashed border-brand-200/60 p-8">
                        <span class="text-5xl block mb-3">😊</span>
                        <p class="text-slate-400 font-semibold text-sm">주문 가능한 메뉴가 현재 없습니다.</p>
                    </div>`;
                return;
            }

            menuContainer.innerHTML = activeDocs.map(documentSnapshot => {
                const menu = documentSnapshot.data();
                const menuId = documentSnapshot.id;
                const isSoldOut = menu.stock <= 0;

                const menuName = menu.name || "메뉴";
                const menuPrice = menu.price || "0원";
                const sanitizedName = menuName.replace(/'/g, "\\'");
                const sanitizedPrice = String(menuPrice).replace(/'/g, "\\'");

                return `
                    <div class="bg-white rounded-2xl border border-brand-100/50 overflow-hidden shadow-sm hover:shadow-md transition-all flex flex-col justify-between relative p-4 group">
                        <div>
                            <div class="w-full h-24 md:h-32 rounded-xl overflow-hidden bg-white flex items-center justify-center mb-3 relative border border-slate-50">
                                <img src="${menu.imageUrl || ''}" class="w-full h-full object-contain p-1 group-hover:scale-105 transition-transform duration-300" onerror="this.src='https://placehold.co/300x200/efecf9/8e44ad?text=No+Image'">
                                ${isSoldOut ? '<div class="absolute inset-0 bg-black/60 backdrop-blur-[1px] flex justify-center items-center text-white text-xs font-black tracking-widest z-10">SOLD OUT</div>' : ''}
                            </div>
                            <h3 class="font-extrabold text-slate-800 text-xs md:text-sm leading-tight mb-1 truncate">${menuName}</h3>
                            <p class="text-brand-500 font-black text-xs md:text-sm mb-2">${menuPrice}</p>
                        </div>

                        <div>
                            <div class="text-[10px] font-bold text-center mb-2 bg-brand-50 py-0.5 rounded-lg ${isSoldOut ? 'text-red-500 bg-red-50' : 'text-slate-500'}">
                                재고: ${isSoldOut ? '품절' : menu.stock + '개'}
                            </div>
                            <button class="w-full bg-brand-500 hover:bg-brand-600 text-white py-2 rounded-xl text-xs font-bold shadow-sm transition-colors ${isSoldOut ? 'bg-slate-300 hover:bg-slate-300 cursor-not-allowed shadow-none' : ''}" 
                                    ${isSoldOut ? 'disabled' : ''} 
                                    onclick="addToCart('${menuId}', '${sanitizedName}', '${menu.imageUrl || ''}', '${sanitizedPrice}', ${menu.stock})">
                                ${isSoldOut ? '품절되었습니다' : '<i class="fa-solid fa-plus mr-1"></i> 담기'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        });

        // 🔥 [핵심 해결 2]: 여러 개의 메뉴를 장바구니에 누적 보관하는 기능
        window.addToCart = function(menuId, name, imageUrl, priceStr, maxStock) {
            const existingItem = cart.find(item => item.menuId === menuId);
            const priceNum = parseInt(String(priceStr).replace(/[^0-9]/g, ''), 10) || 0;

            if (existingItem) {
                if (existingItem.quantity + 1 > maxStock) {
                    alert(`죄송합니다! [${name}] 제품의 남은 재고량(${maxStock}개)을 초과하여 담을 수 없습니다.`);
                    return;
                }
                existingItem.quantity += 1;
            } else {
                if (maxStock <= 0) return;
                cart.push({
                    menuId: menuId,
                    name: name,
                    imageUrl: imageUrl,
                    priceNum: priceNum,
                    quantity: 1,
                    maxStock: maxStock
                });
            }
            renderCart();
        };

        // 장바구니 내 수량 조절 (+ / -) 버튼 기능
        window.updateCartQuantity = function(menuId, change) {
            const targetItem = cart.find(item => item.menuId === menuId);
            if (!targetItem) return;

            const nextQty = targetItem.quantity + change;
            if (nextQty <= 0) {
                window.removeFromCart(menuId);
                return;
            }

            if (nextQty > targetItem.maxStock) {
                alert(`매장에 남아있는 재고(${targetItem.maxStock}개)가 최대 수량입니다.`);
                return;
            }

            targetItem.quantity = nextQty;
            renderCart();
        };

        window.removeFromCart = function(menuId) {
            cart = cart.filter(item => item.menuId !== menuId);
            renderCart();
        };

        // 장바구니 실시간 드로잉 렌더링
        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const countBadge = document.getElementById('cart-count-badge');
            const totalPriceDisplay = document.getElementById('cart-total-price');
            const checkoutBtn = document.getElementById('checkout-btn');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div id="cart-empty-msg" class="text-center py-12 text-slate-400 text-xs font-semibold">
                        <i class="fa-solid fa-cart-plus text-2xl block mb-2 opacity-40 text-brand-500"></i>
                        메뉴를 선택해 주세요.
                    </div>`;
                countBadge.innerText = '0';
                totalPriceDisplay.innerText = '0원';
                checkoutBtn.disabled = true;
                checkoutBtn.innerText = '주문하기 (0개)';
                checkoutBtn.className = "w-full bg-slate-300 text-slate-500 font-black py-3 rounded-xl transition duration-200 text-xs md:text-sm cursor-not-allowed";
                return;
            }

            let totalCount = 0;
            let totalPrice = 0;

            container.innerHTML = cart.map(item => {
                totalCount += item.quantity;
                totalPrice += (item.priceNum * item.quantity);

                return `
                    <div class="bg-brand-50/70 border border-brand-100/80 rounded-xl p-2.5 flex items-center justify-between gap-2 text-xs">
                        <div class="flex items-center gap-2 overflow-hidden flex-1">
                            <img src="${item.imageUrl || 'https://placehold.co/150?text=No+Image'}" class="w-8 h-8 rounded-lg bg-white border object-contain shrink-0" onerror="this.src='https://placehold.co/150?text=No+Image'">
                            <div class="overflow-hidden flex-1">
                                <p class="font-black text-slate-800 truncate">${item.name}</p>
                                <p class="text-[10px] text-brand-600 font-bold">${(item.priceNum * item.quantity).toLocaleString()}원</p>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-1 shrink-0 bg-white border border-brand-200 rounded-lg p-0.5">
                            <button onclick="updateCartQuantity('${item.menuId}', -1)" class="w-4 h-4 flex items-center justify-center text-slate-500 hover:bg-slate-100 rounded font-black text-xs">-</button>
                            <span class="w-4 text-center font-black text-slate-800 text-[10px]">${item.quantity}</span>
                            <button onclick="updateCartQuantity('${item.menuId}', 1)" class="w-4 h-4 flex items-center justify-center text-slate-500 hover:bg-slate-100 rounded font-black text-xs">+</button>
                        </div>

                        <button onclick="removeFromCart('${item.menuId}')" class="text-slate-400 hover:text-rose-500 shrink-0 transition">
                            <i class="fa-solid fa-circle-xmark text-sm"></i>
                        </button>
                    </div>
                `;
            }).join('');

            countBadge.innerText = totalCount;
            totalPriceDisplay.innerText = totalPrice.toLocaleString() + '원';
            
            checkoutBtn.disabled = false;
            checkoutBtn.innerText = `최종 주문하기 (${totalCount}개)`;
            checkoutBtn.className = "w-full bg-brand-500 hover:bg-brand-600 text-white font-black py-3 rounded-xl transition duration-200 text-xs md:text-sm tracking-wide shadow-md shadow-brand-500/20 cursor-pointer";
        }

        // 🚀 파이어베이스 트랜잭션 기반 일괄 주문 발송 시스템 (충돌/실패 방지 완벽 구현)
        window.submitCartOrder = async function() {
            if (cart.length === 0) return;

            const storeRef = doc(db, "system_status", "store");
            const checkoutBtn = document.getElementById('checkout-btn');
            
            checkoutBtn.disabled = true;
            checkoutBtn.innerText = "주문서 전송 중...";

            try {
                let orderNumStr = "";
                let menuNameCombined = "";
                let totalCartPrice = 0;
                const firstImageUrl = cart[0].imageUrl || ""; 

                await runTransaction(db, async (transaction) => {
                    const storeSnap = await transaction.get(storeRef);
                    if (!storeSnap.exists()) throw "영업 정보 데이터가 존재하지 않습니다.";

                    const updateTargets = [];
                    for (const item of cart) {
                        const menuRef = doc(db, "menus", item.menuId);
                        const menuSnap = await transaction.get(menuRef);
                        
                        if (!menuSnap.exists()) throw `[${item.name}] 메뉴가 실시간으로 소실되었습니다.`;
                        
                        const dbStock = menuSnap.data().stock;
                        if (dbStock < item.quantity) {
                            throw `죄송합니다! [${item.name}]의 재고가 부족합니다.\n(현재 주문 가능 수량: ${dbStock}개)`;
                        }
                        
                        updateTargets.push({ ref: menuRef, newStock: dbStock - item.quantity });
                        totalCartPrice += (item.priceNum * item.quantity);
                    }

                    // 주문 순차 고유 번호 카운터 발급
                    let currentCounter = storeSnap.data().store_counter;
                    if (currentCounter === undefined) {
                        currentCounter = 1;
                    } else {
                        currentCounter += 1;
                    }
                    orderNumStr = `${currentCounter}`;

                    // 검증 완료된 메뉴들의 재고 트랜잭션 차감 처리
                    for (const target of updateTargets) {
                        transaction.update(target.ref, { stock: target.newStock });
                    }

                    // 매장 번호 카운터 업데이트
                    transaction.update(storeRef, { store_counter: currentCounter });

                    // 주방 화면 표시 전용 문자열 빌드 ("아메리카노 2개 / 라떼 1개")
                    menuNameCombined = cart.map(i => `${i.name} ${i.quantity}개`).join(" / ");

                    // 트랜잭션 내부에서 일련번호 충돌 없이 새 주문 문서 생성
                    const newOrderRef = doc(collection(db, "orders"));
                    transaction.set(newOrderRef, {
                        menuName: menuNameCombined,
                        menuImageUrl: firstImageUrl,
                        type: "매장",
                        status: "대기",
                        timestamp: serverTimestamp(),
                        orderNumber: orderNumStr,
                        price: `${totalCartPrice.toLocaleString()}원` 
                    });
                });

                // 성공 시 장바구니 비우기 및 영수증 팝업
                cart = [];
                renderCart();
                renderReceiptModal(orderNumStr);

            } catch (e) {
                console.error("주문 실패 사유:", e);
                alert(String(e));
                renderCart();
            }
        };

        function renderReceiptModal(orderNumber) {
            const modal = document.getElementById('receipt-modal');
            const orderNumDisplay = document.getElementById('modal-order-number');
            orderNumDisplay.innerText = `#${orderNumber}`;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.firstElementChild.classList.remove('scale-95');
                modal.firstElementChild.classList.add('scale-100');
            }, 50);
        }

        window.closeReceiptModal = function() {
            const modal = document.getElementById('receipt-modal');
            modal.firstElementChild.classList.remove('scale-100');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 150);
        };
    </script>
</body>
</html>
