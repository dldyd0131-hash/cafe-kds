<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛵 배달원 실시간 관제 센터</title>
    <!-- 폰트 및 아이콘 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f4f1f8',
                            100: '#e9e3f1',
                            200: '#d3c7e4',
                            500: '#8e44ad',
                            600: '#7d3c98',
                            700: '#6c3483',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- 상단 헤더 바 (앱 스타일 고정) -->
    <header class="bg-gradient-to-r from-brand-600 to-indigo-700 text-white p-5 sticky top-0 z-50 shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <span class="bg-white/20 px-2 py-1 rounded-md text-[10px] font-black uppercase tracking-widest mb-1 inline-block">Delivery App</span>
                <h1 class="text-xl font-black flex items-center gap-2">
                    <i class="fa-solid fa-motorcycle text-yellow-300"></i>
                    <span>배달 기사 관제탑</span>
                </h1>
            </div>
            <div class="text-right">
                <div class="text-xs text-brand-100 font-bold mb-0.5">배달 대기 중</div>
                <div class="text-3xl font-black leading-none text-yellow-300" id="active-delivery-count">0</div>
            </div>
        </div>
    </header>

    <!-- 메인 배달 목록 컨테이너 (모바일 최적화) -->
    <main class="p-4 max-w-md mx-auto space-y-5 mt-2" id="delivery-list">
        <!-- 실시간 배달 카드 바인딩 영역 -->
    </main>

    <!-- 🔔 오디오 알림 스크립트 (새로운 배달 콜이 들어올 때) -->
    <script>
        let lastDeliveryCount = 0;
        function playCallSound() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                let osc1 = context.createOscillator();
                osc1.type = 'square';
                osc1.frequency.setValueAtTime(440, context.currentTime); // A4
                osc1.connect(context.destination);
                osc1.start(); osc1.stop(context.currentTime + 0.1);
                
                setTimeout(() => {
                    let osc2 = context.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.setValueAtTime(880, context.currentTime); // A5
                    osc2.connect(context.destination);
                    osc2.start(); osc2.stop(context.currentTime + 0.2);
                }, 150);
            } catch (e) { console.log("알림음 발생 오류:", e); }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 파이어베이스 연동 키
        const firebaseConfig = {
            apiKey: "AIzaSyBVoO2KYyzZEIE-SyySmu3rNzu8AYr3mnk",
            authDomain: "school-cafe-73253.firebaseapp.com",
            projectId: "school-cafe-73253",
            storageBucket: "school-cafe-73253.firebasestorage.app",
            messagingSenderId: "338045111027",
            appId: "1:338045111027:web:ab9c11793582bdcdb20586"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const deliveryList = document.getElementById('delivery-list');
        const activeCount = document.getElementById('active-delivery-count');

        // 주방에서 '배달중' 상태로 넘긴 주문만 가져오기
        onSnapshot(collection(db, "orders"), (snapshot) => {
            const pendingDeliveries = snapshot.docs
                .map(doc => ({ id: doc.id, ...doc.data() }))
                .filter(order => order.type === "배달" && order.status === "배달중")
                .sort((a, b) => {
                    // 가장 먼저 조리가 완료된(오래 기다린) 주문부터 상단에 배치
                    const timeA = a.timestamp ? a.timestamp.toMillis() : 0;
                    const timeB = b.timestamp ? b.timestamp.toMillis() : 0;
                    return timeA - timeB; 
                });

            // 상단 카운트 업데이트
            activeCount.innerText = pendingDeliveries.length;

            // 새로운 배달 콜이 생기면 소리 재생
            if (pendingDeliveries.length > lastDeliveryCount) {
                playCallSound();
            }
            lastDeliveryCount = pendingDeliveries.length;

            // 배달 목록이 없을 때
            if (pendingDeliveries.length === 0) {
                deliveryList.innerHTML = `
                    <div class="text-center py-20 px-4 bg-white rounded-3xl border border-slate-200 shadow-sm mt-10">
                        <div class="w-20 h-20 bg-slate-50 text-4xl rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-100 shadow-inner">
                            🛵
                        </div>
                        <h2 class="text-xl font-bold text-slate-700 mb-2">배달 대기열이 텅 비었습니다!</h2>
                        <p class="text-slate-500 text-sm">주방에서 조리를 완료하면<br>이곳에 배달 콜이 자동으로 뜹니다.</p>
                    </div>
                `;
                return;
            }

            // 배달 목록 렌더링 (모바일 기사앱 스타일)
            deliveryList.innerHTML = pendingDeliveries.map(order => {
                return `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-slate-100 transition-transform active:scale-[0.98]">
                        <!-- 상단 바: 주문번호 및 시간 -->
                        <div class="bg-slate-50 px-5 py-3 border-b border-slate-100 flex justify-between items-center">
                            <span class="font-black text-brand-600 text-sm tracking-wide">#${order.orderNumber}</span>
                            <span class="text-xs text-slate-400 font-semibold flex items-center gap-1">
                                <i class="fa-regular fa-clock"></i>
                                ${order.timestamp ? new Date(order.timestamp.toMillis()).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) : ''} 접수
                            </span>
                        </div>

                        <div class="p-5">
                            <!-- 📍 가장 중요한 배달 목적지 정보 (초대형 글씨) -->
                            <div class="bg-amber-50 border border-amber-100 rounded-2xl p-4 mb-4 relative overflow-hidden">
                                <div class="absolute -right-4 -bottom-4 text-amber-500/10 text-8xl"><i class="fa-solid fa-location-dot"></i></div>
                                <div class="relative z-10">
                                    <div class="text-amber-800 text-xs font-bold uppercase tracking-wider mb-1 flex items-center gap-1">
                                        <i class="fa-solid fa-location-arrow"></i> 배달 목적지
                                    </div>
                                    <h2 class="text-3xl font-black text-slate-900 leading-tight mb-2 tracking-tight">
                                        ${order.deliveryLocation}
                                    </h2>
                                    <div class="inline-flex items-center gap-2 bg-white px-3 py-1.5 rounded-lg border border-amber-100 shadow-sm">
                                        <span class="bg-amber-100 text-amber-700 w-6 h-6 flex items-center justify-center rounded-full text-xs font-black"><i class="fa-solid fa-user"></i></span>
                                        <span class="font-bold text-slate-700">${order.buyerName}</span>
                                    </div>
                                </div>
                            </div>

                            <!-- 🍔 배달할 음식 내용물 확인 (실수 방지용 미니 썸네일) -->
                            <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100 mb-5">
                                <img src="${order.menuImageUrl || 'https://placehold.co/100x100?text=No+Img'}" 
                                     class="w-12 h-12 object-cover rounded-lg bg-white border border-slate-200 shrink-0" 
                                     onerror="this.src='https://placehold.co/100x100?text=No+Img'">
                                <div class="flex-1 overflow-hidden">
                                    <span class="text-[10px] text-slate-400 font-bold block mb-0.5">배달 물품</span>
                                    <h3 class="text-sm font-bold text-slate-800 truncate">${order.menuName}</h3>
                                </div>
                            </div>

                            <!-- ✅ 완료 액션 버튼 -->
                            <button onclick="finishDelivery('${order.id}', '${order.deliveryLocation}')" 
                                    class="w-full bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-bold py-4 rounded-2xl flex justify-center items-center gap-2 text-lg shadow-lg shadow-brand-500/30 transition-colors">
                                <i class="fa-solid fa-check-circle text-xl"></i>
                                <span>배달 완료 처리하기</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        });

        // 배달 기사가 완료 처리 시 실행되는 함수
        window.finishDelivery = async function(id, location) {
            if(confirm(`[ ${location} ]\n정확하게 배달을 완료하셨습니까?`)) {
                try {
                    const orderRef = doc(db, "orders", id);
                    await updateDoc(orderRef, { status: "완료" });
                    
                    // 완료 성공 토스트(가벼운 알림) 대신 브라우저의 기본 처리를 빠르게 넘김
                } catch (e) {
                    alert("처리 중 오류가 발생했습니다: " + e);
                }
            }
        };
    </script>
</body>
</html>
