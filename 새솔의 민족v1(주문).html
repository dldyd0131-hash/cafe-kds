<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 SCHOOL CAFE KIOSK (IN-STORE)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f4f1f8',
                            100: '#e9e3f1',
                            200: '#d3c7e4',
                            500: '#8e44ad',
                            600: '#7d3c98',
                            700: '#6c3483',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* 📸 배경 이미지 추가 및 연보라색 반투명 오버레이 적용 */
            background-image: linear-gradient(rgba(244, 241, 248, 0.85), rgba(244, 241, 248, 0.92)), url('images/bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f0f7;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-brand-50 min-h-screen flex flex-col items-center p-4 md:p-8 relative">

    <div id="closed-overlay" class="fixed inset-0 bg-gradient-to-br from-brand-600 to-indigo-950 z-[9999] flex flex-col justify-center items-center text-white text-center p-6 transition-all duration-500 ease-in-out">
        <div class="text-8xl mb-6 animate-bounce">☕</div>
        <h2 class="text-3xl md:text-4xl font-extrabold mb-4">현재 영업 준비 중입니다</h2>
        <p class="text-base md:text-lg opacity-90 leading-relaxed max-w-md">
            선생님(관리자)께서 영업을 개시하면<br>
            실시간으로 주문 시스템이 자동으로 활성화됩니다.<br>
            잠시만 기다려 주세요!
        </p>
    </div>

    <div id="receipt-modal" class="fixed inset-0 bg-black/60 z-[999] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform scale-95 transition-all duration-300">
            <div class="h-2 bg-gradient-to-r from-brand-500 to-indigo-500"></div>
            <div class="p-6 text-center">
                <div class="w-16 h-16 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fa-solid fa-receipt"></i>
                </div>
                <h3 class="text-2xl font-black text-slate-800 mb-1">매장 주문이 접수되었습니다!</h3>
                <p class="text-sm text-slate-500 mb-6">아래 주문번호를 확인해 주세요.</p>
                
                <div class="bg-slate-50 border border-dashed border-slate-200 rounded-xl p-5 mb-6">
                    <span class="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-1">Order Number</span>
                    <span id="modal-order-number" class="text-4xl font-extrabold text-brand-600 tracking-tight">#1</span>
                </div>

                <div class="text-left text-xs text-slate-500 space-y-1 mb-6 bg-brand-50/50 p-4 rounded-xl border border-brand-100">
                    <p class="font-bold text-brand-700 mb-1"><i class="fa-solid fa-circle-info mr-1"></i> 알림 및 이용 안내</p>
                    <p>매장 카운터의 모니터 또는 전광판에 고객님의 대기 번호가 표시되면 음식을 수령해 주세요.</p>
                </div>

                <button onclick="closeReceiptModal()" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3.5 px-6 rounded-xl transition duration-200 shadow-lg shadow-brand-500/20">
                    확인 및 닫기
                </button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-4xl">
        <header class="text-center my-8 bg-white/70 backdrop-blur border border-brand-100 p-6 rounded-2xl shadow-sm">
            <span class="bg-brand-100 text-brand-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">In-Store Kiosk</span>
            <h1 class="text-3xl font-black text-brand-700 tracking-tight flex items-center justify-center gap-2 mt-2">
                <span>🛒 SCHOOL CAFE</span>
            </h1>
            <p class="text-sm text-slate-500 mt-1 font-medium">학교 매장 실습용 키오스크 전용 주문 시스템</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6 animate-fade-in" id="menu-container">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 파이어베이스 연동 키
        const firebaseConfig = {
            apiKey: "AIzaSyBVoO2KYyzZEIE-SyySmu3rNzu8AYr3mnk",
            authDomain: "school-cafe-73253.firebaseapp.com",
            projectId: "school-cafe-73253",
            storageBucket: "school-cafe-73253.firebasestorage.app",
            messagingSenderId: "338045111027",
            appId: "1:338045111027:web:ab9c11793582bdcdb20586"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🚨 [영업 상태 실시간 감지 리스너]
        onSnapshot(doc(db, "system_status", "store"), (docSnap) => {
            const overlay = document.getElementById('closed-overlay');
            if (docSnap.exists() && docSnap.data().status === "open") {
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
                overlay.style.transform = 'translateY(-100vh)';
            } else {
                overlay.style.opacity = '1';
                overlay.style.pointerEvents = 'auto';
                overlay.style.transform = 'translateY(0)';
            }
        });

        const menuContainer = document.getElementById('menu-container');
        onSnapshot(collection(db, "menus"), (snapshot) => {
            if(snapshot.docs.length === 0) {
                menuContainer.innerHTML = `
                    <div class="col-span-full text-center py-16 bg-white rounded-3xl border border-dashed border-brand-200/60 p-8">
                        <span class="text-5xl block mb-3">😊</span>
                        <p class="text-slate-400 font-semibold text-sm">등록된 메뉴가 아직 없습니다.<br>관리자 페이지에서 메뉴를 등록해 주세요!</p>
                    </div>`;
                return;
            }
            menuContainer.innerHTML = snapshot.docs.map(documentSnapshot => {
                const menu = documentSnapshot.data();
                const menuId = documentSnapshot.id;
                const isSoldOut = menu.stock <= 0;

                return `
                    <div class="bg-white rounded-2xl border border-brand-100/50 overflow-hidden shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-200 flex flex-col justify-between relative p-4 group">
                        <div>
                            <div class="w-full h-28 md:h-36 rounded-xl overflow-hidden bg-white flex items-center justify-center mb-3 relative border border-slate-50">
                                <img src="${menu.imageUrl}" class="w-full h-full object-contain p-1 group-hover:scale-105 transition-transform duration-300" onerror="this.src='https://placehold.co/300x200/efecf9/8e44ad?text=No+Image'">
                                ${isSoldOut ? '<div class="absolute inset-0 bg-black/60 backdrop-blur-[1px] flex justify-center items-center text-white text-sm font-black tracking-widest z-10">SOLD OUT</div>' : ''}
                            </div>
                            <h3 class="font-extrabold text-slate-800 text-sm md:text-base leading-tight mb-1 truncate">${menu.name}</h3>
                            <p class="text-brand-500 font-black text-sm md:text-base mb-2">${menu.price}</p>
                        </div>

                        <div>
                            <div class="text-[11px] font-bold text-center mb-2 bg-brand-50 py-1 rounded-lg ${isSoldOut ? 'text-red-500 bg-red-50' : 'text-slate-500'}">
                                남은 수량: ${isSoldOut ? '품절' : menu.stock + '개'}
                            </div>
                            <button class="w-full bg-brand-500 hover:bg-brand-600 text-white py-2.5 rounded-xl text-xs md:text-sm font-bold shadow-md shadow-brand-500/10 transition-colors ${isSoldOut ? 'bg-slate-300 hover:bg-slate-300 shadow-none cursor-not-allowed' : ''}" 
                                    ${isSoldOut ? 'disabled' : ''} 
                                    onclick="placeOrder('${menuId}', '${menu.name}', '${menu.imageUrl}')">
                                ${isSoldOut ? '품절되었습니다' : '주문하기'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        });

        window.placeOrder = async function(menuId, menuName, menuImageUrl) {
            const menuRef = doc(db, "menus", menuId);
            const storeRef = doc(db, "system_status", "store");

            try {
                let orderNumStr = "";

                await runTransaction(db, async (transaction) => {
                    const sfDoc = await transaction.get(menuRef);
                    if (!sfDoc.exists()) throw "등록되지 않은 메뉴입니다.";

                    const storeSnap = await transaction.get(storeRef);
                    if (!storeSnap.exists()) throw "영업 정보가 존재하지 않습니다.";

                    const newStock = sfDoc.data().stock - 1;
                    if (newStock < 0) throw "죄송합니다! 재고가 모두 소진되었습니다.";

                    // 🔢 매장 주문번호 순차 생성 (#1, #2, #3...)
                    let currentCounter = storeSnap.data().store_counter;
                    if (currentCounter === undefined) {
                        currentCounter = 1;
                    } else {
                        currentCounter += 1;
                    }
                    orderNumStr = `${currentCounter}`;

                    transaction.update(menuRef, { stock: newStock });
                    transaction.update(storeRef, { store_counter: currentCounter });

                    // 주문 생성 (주방 화면 연동용 이미지 포함)
                    await addDoc(collection(db, "orders"), {
                        menuName: menuName,
                        menuImageUrl: menuImageUrl || "",
                        type: "매장",
                        status: "대기",
                        timestamp: serverTimestamp(),
                        orderNumber: orderNumStr
                    });
                });

                // 성공 영수증 띄우기
                renderReceiptModal(orderNumStr);

            } catch (e) {
                console.error("주문 오류:", e);
                renderErrorModal(e);
            }
        };

        // 영수증 바인딩 및 출력
        function renderReceiptModal(orderNumber) {
            const modal = document.getElementById('receipt-modal');
            const orderNumDisplay = document.getElementById('modal-order-number');

            orderNumDisplay.innerText = `#${orderNumber}`;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.firstElementChild.classList.remove('scale-95');
                modal.firstElementChild.classList.add('scale-100');
            }, 50);
        }

        // 모달 창 닫기
        window.closeReceiptModal = function() {
            const modal = document.getElementById('receipt-modal');
            modal.firstElementChild.classList.remove('scale-100');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 150);
        };

        // 에러 모달 안내 처리
        function renderErrorModal(errorMessage) {
            const modal = document.getElementById('receipt-modal');
            modal.querySelector('h3').innerText = "주문 처리에 실패했습니다";
            modal.querySelector('p').innerText = "에러 사유를 아래에서 확인하세요.";
            document.getElementById('modal-order-number').innerText = "ERROR";
            modal.querySelector('.text-slate-500').nextElementSibling.nextElementSibling.innerText = errorMessage;
            modal.classList.remove('hidden');
        }
    </script>
</body>
</html>
